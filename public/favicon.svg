<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2557"/>
      <stop offset="50%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="house" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <circle cx="200" cy="200" r="200" fill="white" opacity="0.03"/>

  <!-- House silhouette - modern minimal -->
  <path d="M256 120 L380 220 L380 380 L132 380 L132 220 Z" fill="url(#house)" opacity="0.95"/>

  <!-- Roof overhang (soffit reference) -->
  <path d="M110 228 L256 108 L402 228" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Door -->
  <rect x="228" y="290" width="56" height="90" rx="6" fill="#2563EB" opacity="0.6"/>

  <!-- Window left -->
  <rect x="160" y="255" width="48" height="48" rx="6" fill="#2563EB" opacity="0.4"/>

  <!-- Window right -->
  <rect x="304" y="255" width="48" height="48" rx="6" fill="#2563EB" opacity="0.4"/>

  <!-- Bubbles - signature element -->
  <circle cx="390" cy="130" r="42" fill="white" opacity="0.85" filter="url(#glow)"/>
  <circle cx="340" cy="80" r="24" fill="white" opacity="0.6"/>
  <circle cx="420" cy="85" r="16" fill="white" opacity="0.45"/>
  <circle cx="440" cy="140" r="10" fill="white" opacity="0.3"/>

  <!-- Shine on main bubble -->
  <circle cx="378" cy="118" r="12" fill="white" opacity="0.4"/>
</svg>
